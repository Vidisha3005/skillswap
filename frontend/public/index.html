<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="SkillSwap - A free platform where users connect to teach and learn skills from each other"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>SkillSwap - Exchange Skills, Build Community</title>

    <style>
      /* Container for Google Translate */
      #translate-container {
        position: fixed;
        top: -6px;
        left: 15px;
        z-index: 9999;
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 5px 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      /* Ensure the dropdown is visible */
      #google_translate_element select {
        border: none;
        background: transparent;
        font-size: 14px;
        cursor: pointer;
        outline: none;
      }

      /* Remove unwanted Google branding or iframe overflow */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-gadget-icon {
        display: none !important;
      }

      body {
        top: 0 !important;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Wrapper div to hold the widget -->
    <div id="translate-container">
      <div id="google_translate_element"></div>
    </div>

    <div id="root"></div>

    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          },
          "google_translate_element"
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
  </body>
</html>
